server:
  port: 8080

spring:
  application:
    name: diplom

  datasource:
    url: jdbc:postgresql://localhost:5432/clouddb
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
app:
  upload-dir: ${APP_UPLOAD_DIR:./uploads}
logging:
  level:
    root: debug